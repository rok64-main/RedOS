<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedOS Official Page</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: #111;
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    text-align: center;
}

.container {
    width: 900px;
    padding: 50px 20px;
}

.icon {
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin-bottom: 15px;
}

.subtitle {
    color: #aaa;
    font-size: 1.4rem;
    margin-top: 10px;
}

.info {
    margin-top: 20px;
    color: #888;
    font-size: 1rem;
}

.note {
    margin-top: 15px;
    color: #777;
    font-size: 0.95rem;
    font-style: italic;
}

.preview-title {
    margin-top: 45px;
    font-size: 1.5rem;
}

.preview-box {
    background: #1c1c1c;
    padding: 10px;
    margin: 20px auto;
    width: fit-content;
    border-radius: 10px;
}

.preview-box img {
    width: 500px;
    height: 280px;
    object-fit: cover;
    border-radius: 6px;
}

.buttons {
    margin-top: 35px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 15px 45px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #cc0000;
}

.bug {
    background: #333;
}

.bug:hover {
    background: #444;
}

.footer {
    margin-top: 50px;
    color: #666;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

    <img class="icon" src="icon.png" alt="RedOS Icon">

    <div class="subtitle">
        A lightweight operating system built from the ground up
    </div>

    <div class="info">
        RedOS Shell • Version 1.0 • Made with C# / CosmosOS
    </div>

    <div class="note">
        Note: The name "RedOS" might be a temporary name.
    </div>

    <div class="preview-title">
        Images of RedOS
    </div>

    <div class="preview-box">
        <img src="preview.png" alt="RedOS Preview">
    </div>

    <div class="buttons">

        <a href="https://github.com/rok64-main/RedOS/releases/download/OS-Release/RedOS.iso" download>
            <button>Download RedOS</button>
        </a>

        <a href="https://forms.gle/iwnUibXe8qx5xkcx6" target="_blank">
            <button class="bug">Bug Report</button>
        </a>

    </div>

    <div class="footer">
        © 2026 RedOS
    </div>

</div>

</body>
</html>
